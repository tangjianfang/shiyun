<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诗云 · 学习版</title>
  <!-- @@STYLES -->
  <!-- @@DATA -->
</head>
<body>

  <!-- 桌面侧边导航 -->
  <nav class="sidebar" role="navigation" aria-label="主导航">
    <a href="#/" class="sidebar__brand" aria-label="诗云首页">诗</a>
    <div class="sidebar__nav">
      <a href="#/" class="sidebar__item" data-tab="home">
        <span class="sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9.5 21v-6h5v6"/></svg></span>
        <span class="sidebar__item-label">首页</span>
      </a>
      <a href="#/learn" class="sidebar__item" data-tab="learn">
        <span class="sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.5C10.5 5 8 4.3 4.5 4.5v13C8 17.3 10.5 18 12 19.5"/><path d="M12 6.5C13.5 5 16 4.3 19.5 4.5v13C16 17.3 13.5 18 12 19.5"/><path d="M12 6.5v13"/></svg></span>
        <span class="sidebar__item-label">学习</span>
      </a>
      <a href="#/cloud" class="sidebar__item" data-tab="cloud">
        <span class="sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.5 2A4 4 0 0 0 6 19z"/></svg></span>
        <span class="sidebar__item-label">诗云</span>
      </a>
      <a href="#/review" class="sidebar__item" data-tab="review">
        <span class="sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 12a8.5 8.5 0 0 1 14.5-6l2 2"/><path d="M20.5 12a8.5 8.5 0 0 1-14.5 6l-2-2"/><path d="M20 4v4h-4"/><path d="M4 20v-4h4"/></svg></span>
        <span class="sidebar__item-label">复习</span>
      </a>
      <a href="#/quiz" class="sidebar__item" data-tab="quiz">
        <span class="sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"/><path d="M14 6l3 3"/></svg></span>
        <span class="sidebar__item-label">考核</span>
      </a>
      <a href="#/progress" class="sidebar__item" data-tab="progress">
        <span class="sidebar__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-6"/><path d="M22 20H2"/></svg></span>
        <span class="sidebar__item-label">进度</span>
      </a>
    </div>
    <div class="sidebar__spacer"></div>
    <div class="sidebar__user" id="user-switcher-slot"></div>
  </nav>

  <!-- 移动底部 Tab -->
  <nav class="tab-bar" role="navigation" aria-label="底部导航">
    <a href="#/" class="tab-bar__item" data-tab="home">
      <span class="tab-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9.5 21v-6h5v6"/></svg></span>
      <span class="tab-bar__label">首页</span>
    </a>
    <a href="#/learn" class="tab-bar__item" data-tab="learn">
      <span class="tab-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.5C10.5 5 8 4.3 4.5 4.5v13C8 17.3 10.5 18 12 19.5"/><path d="M12 6.5C13.5 5 16 4.3 19.5 4.5v13C16 17.3 13.5 18 12 19.5"/><path d="M12 6.5v13"/></svg></span>
      <span class="tab-bar__label">学习</span>
    </a>
    <a href="#/cloud" class="tab-bar__item" data-tab="cloud">
      <span class="tab-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.5 2A4 4 0 0 0 6 19z"/></svg></span>
      <span class="tab-bar__label">诗云</span>
    </a>
    <a href="#/review" class="tab-bar__item" data-tab="review">
      <span class="tab-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 12a8.5 8.5 0 0 1 14.5-6l2 2"/><path d="M20.5 12a8.5 8.5 0 0 1-14.5 6l-2-2"/><path d="M20 4v4h-4"/><path d="M4 20v-4h4"/></svg></span>
      <span class="tab-bar__label">复习</span>
    </a>
    <a href="#/quiz" class="tab-bar__item" data-tab="quiz">
      <span class="tab-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"/><path d="M14 6l3 3"/></svg></span>
      <span class="tab-bar__label">考核</span>
    </a>
    <a href="#/progress" class="tab-bar__item" data-tab="progress">
      <span class="tab-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-6"/><path d="M22 20H2"/></svg></span>
      <span class="tab-bar__label">进度</span>
    </a>
  </nav>

  <!-- 主内容区 -->
  <main id="app-main" class="app-main" role="main">
    <!-- 启动加载屏（JS 初始化完成后被 renderHome() 替换） -->
    <div id="splash-screen" style="
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#faf6ee;gap:24px;transition:opacity .4s ease;
    ">
      <div style="text-align:center;">
        <div style="
          width:72px;height:72px;
          background:#d94f3d;border-radius:18px;
          display:flex;align-items:center;justify-content:center;
          font-family:'Kaiti SC','STKaiti','KaiTi',serif;
          font-size:2.4rem;color:#fff;font-weight:700;
          box-shadow:0 4px 20px rgba(192,57,43,.35);
          margin:0 auto 16px;
        ">诗</div>
        <div style="font-family:'Kaiti SC','STKaiti','KaiTi',serif;font-size:1.5rem;color:#2b2620;font-weight:700;letter-spacing:.1em;">诗云</div>
        <div style="font-size:.875rem;color:#7a7062;margin-top:6px;" id="splash-stage">正在初始化…</div>
      </div>
      <!-- 进度条 -->
      <div style="width:200px;height:4px;background:#ebe2d2;border-radius:99px;overflow:hidden;">
        <div id="splash-bar" style="
          height:100%;width:5%;background:#d94f3d;border-radius:99px;
          transition:width .35s ease;
        "></div>
      </div>
      <div style="font-size:.75rem;color:#a89e8d;" id="splash-tip">古诗词·学无止境</div>
    </div>
    <div class="content-wrap"></div>
  </main>

  <!-- Toast 容器 -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <noscript>本应用需要 JavaScript 支持</noscript>
  <!-- @@SCRIPTS -->
</body>
</html>
